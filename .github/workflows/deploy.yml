# ============================================================
# deploy.yml — main ブランチへのプッシュで ECS へ自動デプロイ
#
# フロー:
#   1. 変更検出    — apps/web / apps/api の差分を検出し、不要なビルドをスキップ
#   2. Build & Push — ECR へイメージをプッシュ
#   3. DB Migration — ECS Run Task で prisma migrate deploy を実行
#   4. ECS Deploy   — タスク定義を更新しサービスをローリングアップデート
#   5. CF Update    — ECS タスクの Public IP を CloudFront オリジンに反映
#
# セキュリティスキャン（Trivy）は pr-checks.yml で PR 時に実施。
# デプロイフローには含めない（PR マージ後は済み扱い）。
#
# 必須 GitHub Secrets:
#   AWS_ROLE_ARN          — terraform output github_actions_role_arn の値
#   AWS_REGION            — ap-northeast-1
#   ECR_REGISTRY          — <account-id>.dkr.ecr.ap-northeast-1.amazonaws.com
#   ECS_CLUSTER           — terraform output ecs_cluster_name の値
#   ECS_SERVICE_WEB       — terraform output ecs_web_service_name の値
#   ECS_SERVICE_API       — terraform output ecs_api_service_name の値
#   ECS_TASK_FAMILY_WEB   — terraform output ecs_web_task_family の値
#   ECS_TASK_FAMILY_API   — terraform output ecs_api_task_family の値
#   ECS_SUBNETS           — terraform output public_subnet_ids の値（カンマ区切り）
#   SG_API_ID             — terraform output sg_api_id の値
#   CLOUDFRONT_DIST_ID    — terraform output cloudfront_distribution_id の値
# ============================================================

name: Deploy to ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'パスフィルターをバイパスして強制デプロイする (web と api の両方をビルド)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  id-token: write  # OIDC トークン取得に必要
  contents: read

jobs:
  # ─── 変更ファイルの検出 ──────────────────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4

      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/common/**'
              - 'packages/api-client/**'
            api:
              - 'apps/api/**'
              - 'packages/common/**'

  # ─── ECR へイメージをビルド & プッシュ ───────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true' || needs.detect-changes.outputs.api == 'true' || github.event.inputs.force_deploy == 'true'
    outputs:
      # ECR URL はシークレット値を含むためマスクされる。boolean フラグのみ渡し、後続ジョブで URI を再構成する
      web-built: ${{ steps.web-image.outputs.built }}
      api-built: ${{ steps.api-image.outputs.built }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push web image
        id: web-image
        if: needs.detect-changes.outputs.web == 'true' || github.event.inputs.force_deploy == 'true'
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="${ECR_REGISTRY}/budget-dev-web:${IMAGE_TAG}"
          docker buildx build \
            --file apps/web/Dockerfile \
            --tag "${IMAGE}" \
            --tag "${ECR_REGISTRY}/budget-dev-web:latest" \
            --cache-from type=registry,ref="${ECR_REGISTRY}/budget-dev-web:latest" \
            --cache-to type=inline \
            --push \
            .
          echo "built=true" >> "$GITHUB_OUTPUT"

      - name: Build & push api image
        id: api-image
        if: needs.detect-changes.outputs.api == 'true' || github.event.inputs.force_deploy == 'true'
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="${ECR_REGISTRY}/budget-dev-api:${IMAGE_TAG}"
          docker buildx build \
            --file apps/api/Dockerfile \
            --tag "${IMAGE}" \
            --tag "${ECR_REGISTRY}/budget-dev-api:latest" \
            --cache-from type=registry,ref="${ECR_REGISTRY}/budget-dev-api:latest" \
            --cache-to type=inline \
            --push \
            .
          echo "built=true" >> "$GITHUB_OUTPUT"

  # ─── DB マイグレーション ─────────────────────────────────────────────────────
  db-migrate:
    name: DB Migration
    runs-on: ubuntu-latest
    needs: build-and-push
    if: needs.build-and-push.outputs.api-built == 'true'
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run prisma migrate deploy via ECS Run Task
        env:
          CLUSTER: ${{ secrets.ECS_CLUSTER }}
          TASK_FAMILY: ${{ secrets.ECS_TASK_FAMILY_API }}
          SUBNETS: ${{ secrets.ECS_SUBNETS }}
          SG_API: ${{ secrets.SG_API_ID }}
        run: |
          # 最新タスク定義 ARN を取得
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${TASK_FAMILY}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Using task definition: ${TASK_DEF}"

          # prisma migrate deploy を専用スクリプト経由で実行する
          # scripts/run-migrate.js は require.resolve() で prisma CLI パスを解決するため
          # .bin/ symlink の壊れ問題を回避できる。詳細ログを出力するため
          # CloudWatch Logs で実際のエラー内容を確認できる。
          # DATABASE_URL はタスク定義の secrets セクションから SSM 経由で注入される
          TASK_ARN=$(aws ecs run-task \
            --cluster "${CLUSTER}" \
            --task-definition "${TASK_DEF}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${SUBNETS}],securityGroups=[${SG_API}],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["node","scripts/run-migrate.js"]}]}' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task ARN: ${TASK_ARN}"

          # タスク完了を待機
          aws ecs wait tasks-stopped \
            --cluster "${CLUSTER}" \
            --tasks "${TASK_ARN}"

          # 終了コードと停止理由を取得
          TASK_INFO=$(aws ecs describe-tasks \
            --cluster "${CLUSTER}" \
            --tasks "${TASK_ARN}" \
            --output json)

          STOP_REASON=$(echo "${TASK_INFO}" | jq -r '.tasks[0].stoppedReason // "N/A"')
          CONTAINER_REASON=$(echo "${TASK_INFO}" | jq -r '.tasks[0].containers[0].reason // "N/A"')
          EXIT_CODE=$(echo "${TASK_INFO}" | jq -r '.tasks[0].containers[0].exitCode // "null"')

          echo "Stopped reason   : ${STOP_REASON}"
          echo "Container reason : ${CONTAINER_REASON}"
          echo "Exit code        : ${EXIT_CODE}"

          # CloudWatch Logs からマイグレーション実行ログを取得して表示する
          # exit code に関わらず常に表示することで、失敗時の原因調査を GitHub Actions 上で完結させる
          TASK_ID=$(echo "${TASK_ARN}" | sed 's|.*/||')
          NAME_PREFIX="${TASK_FAMILY%-api}"
          LOG_GROUP="/ecs/${NAME_PREFIX}/api"
          LOG_STREAM="ecs/api/${TASK_ID}"
          echo ""
          echo "=== CloudWatch Logs: ${LOG_GROUP}/${LOG_STREAM} ==="
          # ログが CloudWatch に書き込まれるまで数秒待機
          sleep 5
          aws logs get-log-events \
            --log-group-name "${LOG_GROUP}" \
            --log-stream-name "${LOG_STREAM}" \
            --query 'events[].message' \
            --output text 2>/dev/null || echo "(CloudWatch ログの取得に失敗しました。IAM ポリシーまたはログストリーム名を確認してください)"
          echo "============================================================"
          echo ""

          if [ "${EXIT_CODE}" != "0" ]; then
            echo "Migration failed with exit code ${EXIT_CODE}"
            exit 1
          fi

          echo "Migration completed successfully"

  # ─── DB シード ───────────────────────────────────────────────────────────────
  db-seed:
    name: DB Seed
    runs-on: ubuntu-latest
    needs: [build-and-push, db-migrate]
    # 冪等なため毎デプロイ実行する（build-and-push が成功し、migrate が成功 or スキップなら実行）
    if: |
      always() &&
      needs.build-and-push.result == 'success' &&
      (needs.db-migrate.result == 'success' || needs.db-migrate.result == 'skipped')
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run seed via ECS Run Task
        env:
          CLUSTER: ${{ secrets.ECS_CLUSTER }}
          TASK_FAMILY: ${{ secrets.ECS_TASK_FAMILY_API }}
          SUBNETS: ${{ secrets.ECS_SUBNETS }}
          SG_API: ${{ secrets.SG_API_ID }}
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${TASK_FAMILY}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Using task definition: ${TASK_DEF}"

          TASK_ARN=$(aws ecs run-task \
            --cluster "${CLUSTER}" \
            --task-definition "${TASK_DEF}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${SUBNETS}],securityGroups=[${SG_API}],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["node","scripts/run-seed.js"]}]}' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Seed task ARN: ${TASK_ARN}"

          aws ecs wait tasks-stopped \
            --cluster "${CLUSTER}" \
            --tasks "${TASK_ARN}"

          TASK_INFO=$(aws ecs describe-tasks \
            --cluster "${CLUSTER}" \
            --tasks "${TASK_ARN}" \
            --output json)

          EXIT_CODE=$(echo "${TASK_INFO}" | jq -r '.tasks[0].containers[0].exitCode // "null"')
          STOP_REASON=$(echo "${TASK_INFO}" | jq -r '.tasks[0].stoppedReason // "N/A"')

          echo "Stopped reason : ${STOP_REASON}"
          echo "Exit code      : ${EXIT_CODE}"

          TASK_ID=$(echo "${TASK_ARN}" | sed 's|.*/||')
          NAME_PREFIX="${TASK_FAMILY%-api}"
          LOG_GROUP="/ecs/${NAME_PREFIX}/api"
          LOG_STREAM="ecs/api/${TASK_ID}"
          echo ""
          echo "=== CloudWatch Logs: ${LOG_GROUP}/${LOG_STREAM} ==="
          sleep 5
          aws logs get-log-events \
            --log-group-name "${LOG_GROUP}" \
            --log-stream-name "${LOG_STREAM}" \
            --query 'events[].message' \
            --output text 2>/dev/null || echo "(ログの取得に失敗しました)"
          echo "============================================================"

          if [ "${EXIT_CODE}" != "0" ]; then
            echo "Seed failed with exit code ${EXIT_CODE}"
            exit 1
          fi

          echo "Seed completed successfully"

  # ─── ECS サービス更新 ────────────────────────────────────────────────────────
  deploy-ecs:
    name: Deploy ECS
    runs-on: ubuntu-latest
    needs: [build-and-push, db-migrate, db-seed]
    # db-migrate / db-seed がスキップの場合も実行する
    if: |
      always() &&
      needs.build-and-push.result == 'success' &&
      (needs.db-migrate.result == 'success' || needs.db-migrate.result == 'skipped') &&
      (needs.db-seed.result == 'success' || needs.db-seed.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy web service sidecar
        # web または api のいずれかが変更された場合にサイドカータスク定義を更新
        if: needs.build-and-push.outputs.web-built == 'true' || needs.build-and-push.outputs.api-built == 'true'
        env:
          CLUSTER: ${{ secrets.ECS_CLUSTER }}
          SERVICE: ${{ secrets.ECS_SERVICE_WEB }}
          TASK_FAMILY: ${{ secrets.ECS_TASK_FAMILY_WEB }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
          WEB_BUILT: ${{ needs.build-and-push.outputs.web-built }}
          API_BUILT: ${{ needs.build-and-push.outputs.api-built }}
        run: |
          # イメージ URI を再構成（ECR_REGISTRY シークレットはここで展開するため job output には含めない）
          NEW_WEB_IMAGE=""
          NEW_API_IMAGE=""
          [ "${WEB_BUILT}" = "true" ] && NEW_WEB_IMAGE="${ECR_REGISTRY}/budget-dev-web:${IMAGE_TAG}"
          [ "${API_BUILT}" = "true" ] && NEW_API_IMAGE="${ECR_REGISTRY}/budget-dev-api:${IMAGE_TAG}"

          # 現在のサイドカータスク定義を取得
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${TASK_FAMILY}" \
            --query 'taskDefinition' \
            --output json)

          # 変更があったコンテナのみ image を差し替え（空文字の場合は現在の image を維持）
          NEW_TASK_DEF=$(echo "${TASK_DEF}" | \
            jq --arg WEB_IMAGE "${NEW_WEB_IMAGE}" \
               --arg API_IMAGE "${NEW_API_IMAGE}" \
            '(if $WEB_IMAGE != "" then .containerDefinitions[0].image = $WEB_IMAGE else . end) |
             (if $API_IMAGE != "" then .containerDefinitions[1].image = $API_IMAGE else . end) |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .placementConstraints, .compatibilities, .registeredAt, .registeredBy)')

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "${NEW_TASK_DEF}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          # --desired-count 1: コスト節約のため desired_count=0 に停止していた場合でも
          # デプロイ時は必ず 1 タスク起動する。lifecycle.ignore_changes で
          # terraform が desired_count を管理しないため、ここで明示的に指定する。
          aws ecs update-service \
            --cluster "${CLUSTER}" \
            --service "${SERVICE}" \
            --task-definition "${NEW_TASK_DEF_ARN}" \
            --desired-count 1 \
            --force-new-deployment

      - name: Update api task definition for DB migration
        # api タスク定義を最新イメージで更新（migrate コマンド実行のベースとして使用）
        if: needs.build-and-push.outputs.api-built == 'true'
        env:
          TASK_FAMILY: ${{ secrets.ECS_TASK_FAMILY_API }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          NEW_IMAGE="${ECR_REGISTRY}/budget-dev-api:${IMAGE_TAG}"

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${TASK_FAMILY}" \
            --query 'taskDefinition' \
            --output json)

          NEW_TASK_DEF=$(echo "${TASK_DEF}" | \
            jq --arg IMAGE "${NEW_IMAGE}" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .placementConstraints, .compatibilities, .registeredAt, .registeredBy)')

          aws ecs register-task-definition \
            --cli-input-json "${NEW_TASK_DEF}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text

      - name: Wait for web service stability
        # タイムアウトしても後続の CloudFront 更新は実行する（continue-on-error）
        # services-stable はヘルスチェック起因でタイムアウトすることがあるが、
        # update-service 自体は成功しているため CloudFront 更新は必要
        if: needs.build-and-push.outputs.web-built == 'true' || needs.build-and-push.outputs.api-built == 'true'
        continue-on-error: true
        env:
          CLUSTER: ${{ secrets.ECS_CLUSTER }}
          SERVICE: ${{ secrets.ECS_SERVICE_WEB }}
        run: |
          aws ecs wait services-stable \
            --cluster "${CLUSTER}" \
            --services "${SERVICE}"

  # ─── CloudFront オリジン更新 ─────────────────────────────────────────────────
  update-cloudfront:
    name: Update CloudFront Origin
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-ecs]
    # deploy-ecs が success または failure（services-stable タイムアウト含む）の場合に実行
    # skipped（ビルドなし）や cancelled の場合は実行しない
    if: |
      always() &&
      needs.build-and-push.result == 'success' &&
      (needs.deploy-ecs.result == 'success' || needs.deploy-ecs.result == 'failure')
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update CloudFront origin and invalidate cache
        env:
          CLUSTER: ${{ secrets.ECS_CLUSTER }}
          SERVICE: ${{ secrets.ECS_SERVICE_WEB }}
          CLOUDFRONT_DIST_ID: ${{ secrets.CLOUDFRONT_DIST_ID }}
        run: bash scripts/update-cloudfront-origin.sh
