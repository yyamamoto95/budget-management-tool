# ============================================================
# release-flow-wireframe.yml — @yyamamoto95/flow-wireframe の npm 公開
#
# 役割: `flow-wireframe-v*` 形式のタグが push されたとき、
#       packages/flow-wireframe をテスト・ビルドして npm publish する。
#
# 前提: リポジトリ Secrets に NPM_TOKEN（npm Automation トークン）を設定すること。
# 手順: packages/flow-wireframe/CONTRIBUTING.md「リリース手順」を参照
# ============================================================

name: Release flow-wireframe to npm

on:
  push:
    tags:
      - 'flow-wireframe-v*'

permissions:
  contents: read

jobs:
  publish:
    name: テスト・ビルドして npm に公開する
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: タグとpackage.jsonのバージョン一致を検証する
        working-directory: packages/flow-wireframe
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#flow-wireframe-v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::タグ ($TAG_VERSION) と package.json ($PKG_VERSION) のバージョンが一致しません"
            exit 1
          fi

      - name: 型チェック・テスト・ビルド
        working-directory: packages/flow-wireframe
        run: |
          pnpm type-check
          pnpm test:unit
          pnpm build

      - name: npm publish
        working-directory: packages/flow-wireframe
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
