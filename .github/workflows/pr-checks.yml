# ============================================================
# pr-checks.yml — PR 時の自動チェック（マージブロックのガードレール）
#
# フロー（全ジョブ並列実行）:
#   0. issue-link-check          — PR body に Closes #NNN が含まれるか検証
#   1. unresolved-review-check   — 未解決レビュースレッドが残っていないか検証
#   2. lint-typecheck            — lint + 型チェック
#   3. nextjs-build              — Next.js プロダクションビルド（型エラーの早期検出）
#   4. storybook-build           — Storybook ビルド確認
#   5. unit-test                 — ユニットテスト
#   6. integration-test          — 統合テスト（MySQL サービスコンテナ使用）
#   7. security-scan             — Trivy FS スキャン（Docker ビルド不要）
#   8. migration-check           — Prisma スキーマ検証 + 破壊的変更の検出
#   9. infra-check               — Terraform 構文・フォーマットチェック
#
# ブランチ保護設定（GitHub Settings > Branches > main）:
#   Require status checks to pass before merging に以下を登録すること:
#   - Rebase Check
#   - Test Plan Check
#   - Issue Link Check
#   - Unresolved Review Check
#   - Lint & Type Check
#   - Next.js Build
#   - Unit Test
#   - Integration Test
#   - Security Scan (FS)
#   - Migration Check
#   - Infrastructure Check
# ============================================================

name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  # ─── リベースチェック ──────────────────────────────────────────────────────
  # PR ブランチが origin/main の最新から切られていない（遅れている）場合に失敗する。
  # マージ前に必ず最新 main へのリベースを強制するガードレール。
  rebase-check:
    name: Rebase Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # merge-base の計算に全履歴が必要

      - name: Check branch is rebased on latest main
        run: |
          git fetch origin main --quiet

          MERGE_BASE=$(git merge-base HEAD origin/main)
          MAIN_HEAD=$(git rev-parse origin/main)

          echo "origin/main HEAD : ${MAIN_HEAD}"
          echo "merge-base       : ${MERGE_BASE}"

          if [ "${MERGE_BASE}" != "${MAIN_HEAD}" ]; then
            echo ""
            echo "❌ ブランチが origin/main の最新から遅れています。"
            echo ""
            echo "   以下を実行してリベースし、force push してください:"
            echo "   git fetch origin main && git rebase origin/main"
            echo "   git push --force-with-lease"
            exit 1
          fi

          echo "✅ origin/main の最新からリベース済みです。"

  # ─── テストプランチェック ──────────────────────────────────────────────────
  # PR body の "Test plan" セクション内に未チェック項目（- [ ]）が残っている場合に失敗する。
  # 全チェックボックスを確認済みにしてからマージすることを強制するガードレール。
  test-plan-check:
    name: Test Plan Check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Check all test plan items are checked
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # "Test plan" セクション以降を抽出（大文字小文字を問わない）
          TEST_PLAN_SECTION=$(echo "${PR_BODY}" | grep -A 9999 -i '## test plan' || true)

          if [ -z "${TEST_PLAN_SECTION}" ]; then
            echo "⚠️  PR の本文に '## Test plan' セクションが見つかりません。"
            echo "   テストプランを追加するか、テスト不要な場合は '## Test plan' セクションにその理由を記載してください。"
            exit 1
          fi

          # 未チェックのチェックボックス（- [ ]）をカウント
          UNCHECKED=$(echo "${TEST_PLAN_SECTION}" | grep -c '^\s*- \[ \]' || true)

          if [ "${UNCHECKED}" -gt 0 ]; then
            echo "❌ Test plan に未確認の項目が ${UNCHECKED} 件残っています。"
            echo ""
            echo "   以下の項目を確認し、チェックを付けてからマージしてください:"
            echo "${TEST_PLAN_SECTION}" | grep '^\s*- \[ \]'
            exit 1
          fi

          echo "✅ Test plan のすべての項目が確認済みです。"

  # ─── 未解決レビューコメントチェック ────────────────────────────────────────
  # PR にレビュースレッドが未解決のまま残っている場合に失敗する。
  # Gemini・人間レビューの指摘を Resolve してからマージすることを強制するガードレール。
  unresolved-review-check:
    name: Unresolved Review Check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Check for unresolved review threads
        uses: actions/github-script@v7
        with:
          script: |
            const { repository } = await github.graphql(`
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    reviewThreads(first: 100) {
                      nodes {
                        isResolved
                        isOutdated
                        comments(first: 1) {
                          nodes {
                            path
                            body
                            author { login }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: context.issue.number,
            });

            const threads = repository.pullRequest.reviewThreads.nodes;
            const unresolved = threads.filter(t => !t.isResolved && !t.isOutdated);

            if (unresolved.length === 0) {
              console.log('✅ 未解決のレビューコメントはありません。');
              return;
            }

            console.log(`❌ 未解決のレビューコメントが ${unresolved.length} 件あります:\n`);
            for (const t of unresolved) {
              const c = t.comments.nodes[0];
              const author = c?.author?.login ?? '不明';
              const preview = (c?.body ?? '').split('\n')[0].slice(0, 80);
              console.log(`  - [${author}] ${c?.path ?? '(不明)'}: ${preview}`);
            }
            console.log('\n  GitHub 上で全スレッドを「Resolve conversation」してからマージしてください。');
            core.setFailed(`未解決のレビューコメントが ${unresolved.length} 件あります`);

  # ─── Issue リンクチェック ───────────────────────────────────────────────────
  # PR body に "Closes #NNN" / "Fixes #NNN" / "Resolves #NNN" が含まれない場合に失敗する。
  # 古い Issue を放置しないための最低限の強制ガードレール。
  issue-link-check:
    name: Issue Link Check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Check PR body contains issue closing keyword
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          # PR body に Closes/Fixes/Resolves #NNN があるか確認
          if ! echo "${PR_BODY}" | grep -qiE '(closes|fixes|resolves)\s+#[0-9]+'; then
            echo "❌ PR の本文に Issue への参照が見つかりません。"
            echo ""
            echo "   .github/PULL_REQUEST_TEMPLATE.md の「🔗 関連 Issue」セクションに"
            echo "   'Closes #NNN' の形式で Issue 番号を記載してください。"
            echo ""
            echo "   例:"
            echo "     Closes #123"
            echo "     Fixes #456"
            echo "     Resolves #789"
            exit 1
          fi
          echo "✅ Issue への参照を確認しました。"

          # ブランチ名が issue-NNN パターンの場合、PR body との整合性を警告
          BRANCH_ISSUE=$(echo "${BRANCH_NAME}" | grep -oE 'issue-([0-9]+)' | grep -oE '[0-9]+' | head -1)
          if [ -n "${BRANCH_ISSUE}" ]; then
            if echo "${PR_BODY}" | grep -qiE "(closes|fixes|resolves)\s+#${BRANCH_ISSUE}"; then
              echo "✅ ブランチ名 (issue-${BRANCH_ISSUE}) と PR body の Issue 番号が一致しています。"
            else
              echo "⚠️  ブランチ名から Issue #${BRANCH_ISSUE} が検出されましたが、PR body に 'Closes #${BRANCH_ISSUE}' が見つかりません。"
              echo "   意図的（複数 Issue 対応・チョア等）であれば無視してください。"
            fi
          fi

  # ─── lint + 型チェック ─────────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Generate Prisma client
        run: pnpm --filter @budget/api exec prisma generate

      - name: Lint & type-check
        run: pnpm turbo run lint type-check

  # ─── Next.js プロダクションビルド確認 ───────────────────────────────────────
  # Docker ビルドと同等の next build を PR 時点で実行し、型エラーを事前検出する。
  # pnpm turbo run type-check（tsc --noEmit）はインクリメンタルキャッシュを使用するため
  # next build が検出する型エラーを見逃すケースがある。本ジョブで補完する。
  nextjs-build:
    name: Next.js Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build common & api-client
        run: |
          pnpm --filter @budget/common build
          pnpm --filter @budget/api-client build

      - name: Generate Prisma client
        run: pnpm --filter @budget/api exec prisma generate

      - name: Next.js production build
        run: pnpm --filter web build

  # ─── Storybook ビルド確認 ─────────────────────────────────────────────────
  storybook-build:
    name: Storybook Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build common & api-client
        run: |
          pnpm --filter @budget/common build
          pnpm --filter @budget/api-client build

      - name: Build Storybook
        run: pnpm --filter web build-storybook

  # ─── ユニットテスト ────────────────────────────────────────────────────────
  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Generate Prisma client
        run: pnpm --filter @budget/api exec prisma generate

      - name: Run unit tests
        run: pnpm test:unit

  # ─── 統合テスト（実 DB） ───────────────────────────────────────────────────
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_USER: Admin
          MYSQL_PASSWORD: password
          MYSQL_DATABASE: budgetdb_test
        ports:
          - 3307:3306  # .env.test の DB_PORT=3307 に合わせてマッピング
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Generate Prisma client
        env:
          DATABASE_URL: "mysql://Admin:password@127.0.0.1:3307/budgetdb_test"
        run: pnpm --filter @budget/api exec prisma generate

      - name: Push schema to test DB
        env:
          DATABASE_URL: "mysql://Admin:password@127.0.0.1:3307/budgetdb_test"
        run: pnpm --filter @budget/api exec prisma db push --skip-generate

      - name: Run integration tests
        env:
          # DATABASE_URL を明示指定（dotenv の .env.test より優先される）
          DATABASE_URL: "mysql://Admin:password@127.0.0.1:3307/budgetdb_test"
        run: pnpm test:integration

  # ─── セキュリティスキャン（FS） ────────────────────────────────────────────
  # Docker ビルド・ECR 不要。pnpm-lock.yaml を直接スキャンするため高速。
  security-scan:
    name: Security Scan (FS)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # SARIF 結果を GitHub Security タブへアップロード
      issues: write            # CVE 検知時に GitHub Issue を即時作成する
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore
          # CI ランナーのシステム npm 内部依存はプロジェクト管理外のため除外
          skip-dirs: usr/local/lib/node_modules/npm

      - name: Upload scan results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Run Trivy scan (JSON) and create Issues for new findings
        # SARIF スキャンが失敗した場合のみ実行（= HIGH/CRITICAL CVE が存在する）
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # JSON 形式で再スキャンして CVE 詳細を取得
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            aquasec/trivy:latest fs /workspace \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --ignore-unfixed \
            --ignorefile /workspace/.trivyignore \
            --skip-dirs usr/local/lib/node_modules/npm \
            --format json \
            --output /tmp/trivy-result.json 2>/dev/null || true

          # CVE ごとに Open Issue が存在しない場合のみ作成
          python3 << 'PYEOF'
          import json, subprocess, os, sys

          try:
              with open('/tmp/trivy-result.json') as f:
                  data = json.load(f)
          except Exception as e:
              print(f"JSON 読み込みエラー: {e}")
              sys.exit(0)

          vulns = []
          for result in data.get('Results', []):
              for v in result.get('Vulnerabilities') or []:
                  if v.get('Severity') in ('HIGH', 'CRITICAL'):
                      vulns.append(v)

          if not vulns:
              print("HIGH/CRITICAL の CVE なし。Issue 作成をスキップします。")
              sys.exit(0)

          print(f"検出された HIGH/CRITICAL CVE: {len(vulns)} 件")

          for v in vulns:
              cve_id = v.get('VulnerabilityID', '')
              pkg = v.get('PkgName', '')
              severity = v.get('Severity', '')
              installed = v.get('InstalledVersion', '不明')
              fixed = v.get('FixedVersion', '未リリース')
              description = (v.get('Description') or 'N/A')[:300]
              url = v.get('PrimaryURL', 'N/A')

              # 重複チェック
              result = subprocess.run(
                  ['gh', 'issue', 'list', '--state', 'open',
                   '--search', f'"{cve_id}" in:title',
                   '--json', 'number', '--jq', 'length'],
                  capture_output=True, text=True
              )
              if result.stdout.strip() != '0':
                  print(f"{cve_id}: Open Issue 既存のためスキップ")
                  continue

              body = f"""## 概要

          PR Checks の Security Scan (Trivy) が HIGH/CRITICAL CVE を検知しました。

          ## 詳細

          - 影響パッケージ: {pkg} {installed} → 修正版: {fixed}
          - 深刻度: {severity}
          - 説明: {description}
          - 参照: {url}

          ## 対応方針

          - 影響パッケージのアップデートを検討する（`pnpm.overrides` で固定バージョンを指定）
          - 修正版が未リリースの場合は `.trivyignore` に理由コメントとともに追記する

          _自動作成: pr-checks.yml security-scan — PR #{os.environ.get('GITHUB_REF', '').replace('refs/pull/', '').replace('/merge', '')}_"""

              priority = 'priority: P0' if severity == 'CRITICAL' else \
                         'priority: P1' if severity == 'HIGH' else \
                         'priority: P2'

              subprocess.run([
                  'gh', 'issue', 'create',
                  '--title', f'[{severity}] {cve_id} が {pkg} で検出されました',
                  '--label', 'type: chore',
                  '--label', priority,
                  '--label', 'size: S',
                  '--label', 'backlog',
                  '--body', body,
              ], check=False)
              print(f"{cve_id}: Issue 作成完了")
          PYEOF

  # ─── マイグレーションチェック ──────────────────────────────────────────────
  migration-check:
    name: Migration Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git diff で base ブランチとの比較に必要

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Validate Prisma schema
        env:
          # prisma validate はスキーマの静的検証のみ（DB 接続不要）だが、
          # Prisma CLI が DATABASE_URL の存在を要求するためダミー値を設定する
          DATABASE_URL: "mysql://user:pass@localhost:3306/dummy"
        run: pnpm --filter @budget/api exec prisma validate

      - name: Check schema changes have corresponding migration
        run: |
          # schema.prisma が変更されているのにマイグレーション SQL が追加されていない場合は失敗
          git fetch origin "${{ github.base_ref }}" --depth=1

          SCHEMA_CHANGED=$(git diff --name-only \
            "origin/${{ github.base_ref }}...HEAD" \
            -- "apps/api/prisma/schema.prisma" | wc -l)

          MIGRATION_ADDED=$(git diff --name-only --diff-filter=A \
            "origin/${{ github.base_ref }}...HEAD" \
            -- "apps/api/prisma/migrations" 2>/dev/null | grep "\.sql$" | wc -l)

          if [ "${SCHEMA_CHANGED}" -gt 0 ] && [ "${MIGRATION_ADDED}" -eq 0 ]; then
            echo "エラー: schema.prisma が変更されていますが、マイグレーションファイルが追加されていません。"
            echo ""
            echo "以下を実行してマイグレーションを作成してください:"
            echo "  cd apps/api && npx prisma migrate dev --name <変更内容の説明>"
            echo ""
            echo "注意: prisma db push はテスト用途にのみ使用してください。"
            echo "      本番 DB には migrate deploy が使われるため、migration.sql が必須です。"
            exit 1
          fi

          echo "スキーマとマイグレーションの整合性チェック完了。"

      - name: Check for destructive migrations
        run: |
          MIGRATION_DIR="apps/api/prisma/migrations"

          # ベースブランチとの差分でマイグレーションファイルの変更を検出
          git fetch origin "${{ github.base_ref }}" --depth=1
          CHANGED=$(git diff --name-only --diff-filter=AM \
            "origin/${{ github.base_ref }}...HEAD" \
            -- "${MIGRATION_DIR}" 2>/dev/null | grep "\.sql$" || true)

          if [ -z "${CHANGED}" ]; then
            echo "変更されたマイグレーションなし。スキップ。"
            exit 0
          fi

          echo "変更されたマイグレーション:"
          echo "${CHANGED}"
          echo ""

          FOUND=0
          while IFS= read -r FILE; do
            if [ -f "${FILE}" ] && grep -iEq \
              "DROP\s+(TABLE|COLUMN)|ALTER\s+TABLE\s+\S+\s+DROP\s+(COLUMN|INDEX)" \
              "${FILE}"; then
              echo "破壊的変更検出: ${FILE}"
              grep -inE \
                "DROP\s+(TABLE|COLUMN)|ALTER\s+TABLE\s+\S+\s+DROP\s+(COLUMN|INDEX)" \
                "${FILE}"
              FOUND=1
            fi
          done <<< "${CHANGED}"

          if [ "${FOUND}" = "1" ]; then
            echo ""
            echo "破壊的なマイグレーションが検出されました。"
            echo "意図的な変更であれば DBA またはチームの承認を得てからマージしてください。"
            exit 1
          fi

          echo "チェック完了: 破壊的変更なし。"

  # ─── E2E テスト（Playwright） ──────────────────────────────────────────────
  # 先に #403（既存 spec 修正）が完了済みのため、初日から全 spec がグリーンになる。
  # JWT 鍵は pnpm gen:keys で一時生成するため GitHub Secrets の追加は不要。
  e2e-test:
    name: E2E Test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_USER: Admin
          MYSQL_PASSWORD: password
          MYSQL_DATABASE: budgetdb_test
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build common & api-client
        run: |
          pnpm --filter @budget/common build
          pnpm --filter @budget/api-client build

      - name: Generate Prisma client
        env:
          DATABASE_URL: "mysql://Admin:password@127.0.0.1:3307/budgetdb_test"
        run: pnpm --filter @budget/api exec prisma generate

      - name: Run DB migration
        env:
          DATABASE_URL: "mysql://Admin:password@127.0.0.1:3307/budgetdb_test"
        run: pnpm --filter @budget/api exec prisma migrate deploy

      - name: Seed guest user
        env:
          DATABASE_URL: "mysql://Admin:password@127.0.0.1:3307/budgetdb_test"
        run: pnpm --filter @budget/api run seed

      - name: Generate JWT keys
        run: pnpm gen:keys

      - name: Start API server
        env:
          DATABASE_URL: "mysql://Admin:password@127.0.0.1:3307/budgetdb_test"
          NODE_ENV: test
        run: pnpm --filter @budget/api run dev &

      - name: Wait for API
        run: npx wait-on tcp:5000 --timeout 60000

      - name: Start Next.js dev server
        env:
          DATABASE_URL: "mysql://Admin:password@127.0.0.1:3307/budgetdb_test"
        run: pnpm --filter web run dev &

      - name: Wait for Next.js
        run: npx wait-on tcp:3000 --timeout 120000

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          BASE_URL: "http://localhost:3000"
          DATABASE_URL: "mysql://Admin:password@127.0.0.1:3307/budgetdb_test"
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─── インフラ構成チェック ──────────────────────────────────────────────────
  infra-check:
    name: Infrastructure Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Terraform format check
        working-directory: infra/dev
        run: terraform fmt -check -recursive

      - name: Terraform init (backend=false)
        working-directory: infra/dev
        # プロバイダーのダウンロードのみ実行。S3 backend への接続は不要。
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/dev
        run: terraform validate
