name: sprint-backlog ラベル付与時にプロジェクトボードの Sprint # フィールドを設定する

# ──────────────────────────────────────────────────────────────────
# Issue に sprint-backlog ラベルが付与された瞬間に発火し、
# velocity-log.json から現在のスプリント番号を読み取って
# Project の Sprint # フィールドに書き込む。
#
# 必要なシークレット:
#   PROJECT_TOKEN: project スコープを持つ Personal Access Token (classic)
# ──────────────────────────────────────────────────────────────────

on:
  issues:
    types: [labeled]

jobs:
  set-sprint-number:
    if: github.event.label.name == 'sprint-backlog'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Sprint # を velocity-log.json から取得してプロジェクトフィールドに設定する
        env:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PROJECT_ID: ${{ vars.PROJECT_ID || 'PVT_kwHOA-qlQM4BWtuo' }}
          SPRINT_FIELD_ID: ${{ vars.PROJECT_SPRINT_FIELD_ID || 'PVTF_lAHOA-qlQM4BWtuozhSdS10' }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # velocity-log.json から現在のスプリント番号を取得
          # next_sprint_number はプランニング時に +1 済みのため、現在値 - 1 = 進行中スプリント
          CURRENT_SPRINT=$(python3 -c "
          import json
          with open('.github/velocity-log.json') as f:
              data = json.load(f)
          print(data['meta']['next_sprint_number'] - 1)
          ")
          echo "現在のスプリント番号: $CURRENT_SPRINT"

          # Issue をプロジェクトに追加（既存の場合は既存アイテム ID を返す）
          ITEM_ID=$(gh api graphql \
            -H "Authorization: bearer $PROJECT_TOKEN" \
            -f query='
            mutation($projectId: ID!, $contentId: ID!) {
              addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                item { id }
              }
            }' \
            -f projectId="$PROJECT_ID" \
            -f contentId="$ISSUE_NODE_ID" \
            --jq '.data.addProjectV2ItemById.item.id')

          echo "プロジェクトアイテム ID: $ITEM_ID"

          # Sprint # フィールドを設定
          gh api graphql \
            -H "Authorization: bearer $PROJECT_TOKEN" \
            -f query='
            mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: ProjectV2FieldValue!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $projectId
                itemId: $itemId
                fieldId: $fieldId
                value: $value
              }) { projectV2Item { id } }
            }' \
            -f projectId="$PROJECT_ID" \
            -f itemId="$ITEM_ID" \
            -f fieldId="$SPRINT_FIELD_ID" \
            -F "value[number]=$CURRENT_SPRINT"

          echo "完了: Issue #${ISSUE_NUMBER} の Sprint # を ${CURRENT_SPRINT} に設定しました"
