    get:
      tags:
        - Export
      summary: 全取引データのエクスポート
      description: ログイン中ユーザーの全取引データを JSON または CSV 形式でダウンロードする。
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            enum:
              - json
              - csv
            default: json
            description: エクスポート形式
            example: json
          required: false
          name: format
          in: query
      responses:
        "200":
          description: エクスポートデータ
          content:
            application/json:
              schema:
                nullable: true
            text/csv:
              schema:
                nullable: true
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/xday:
    get:
      tags:
        - XDay
      summary: Xデー（資産枯渇日）の算出
      description: 総資産・収入・実績支出データから資産が底をつく日を計算する。
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: integer
            nullable: true
            minimum: 0
            description: 現在の総資産残高（円）
            example: 5000000
          required: false
          name: totalAssets
          in: query
        - schema:
            type: integer
            nullable: true
            minimum: 0
            default: 0
            description: 月次固定収入（円）。0は収入なし
            example: 0
          required: false
          name: monthlyIncome
          in: query
      responses:
        "200":
          description: Xデー算出結果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/XDayResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/xday/analysis:
    get:
      tags:
        - XDay
      summary: 支出解剖（断罪UI）
      description: 今月のカテゴリ別支出と統計偏差値・Xデーへの影響日数を返す。
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: number
            nullable: true
            minimum: 0
            default: 0
            description: Xデー算出で得た純日次消費（E_net）。0の場合はXデーへの影響日数は計算しない
            example: 4067
          required: false
          name: netDailyExpense
          in: query
      responses:
        "200":
          description: 支出解剖データ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenditureAnalysisResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
