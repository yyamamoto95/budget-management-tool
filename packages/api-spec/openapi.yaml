openapi: 3.0.0
info:
  version: 1.0.0
  title: 家計簿管理ツール API
  description: 支出（Expense）の登録・管理を行う REST API。JWT Bearer 認証が必要。
servers:
  - url: http://localhost:5000
    description: ローカル開発
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    TokenPairResponse:
      type: object
      properties:
        result:
          type: string
          enum:
            - success
        accessToken:
          type: string
          example: eyJhbGciOiJSUzI1NiJ9...
        refreshToken:
          type: string
          example: eyJhbGciOiJSUzI1NiJ9...
        userId:
          type: string
          example: user01
      required:
        - result
        - accessToken
        - refreshToken
        - userId
    ErrorResponse:
      type: object
      properties:
        result:
          type: string
          enum:
            - error
          example: error
        message:
          type: string
          example: エラーメッセージ
      required:
        - result
        - message
    LoginRequest:
      type: object
      properties:
        userId:
          type: string
          minLength: 1
          example: user01
        password:
          type: string
          minLength: 1
          example: ••••••••
      required:
        - userId
        - password
    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 1
          example: eyJ...
      required:
        - refreshToken
    LogoutResponse:
      type: object
      properties:
        result:
          type: string
          enum:
            - success
            - error
          example: success
        message:
          type: string
          example: ログアウトしました
      required:
        - result
        - message
    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
          example: eyJ...
    CategoryItem:
      type: object
      properties:
        id:
          type: integer
          description: カテゴリID
          example: 1
        key:
          type: string
          description: セマンティクキー
          example: food
        name:
          type: string
          description: 表示名
          example: 食費
        color:
          type: string
          description: アイコン/テキスト前景色
          example: "#f18840"
        bg:
          type: string
          description: バッジ/ボタン背景色
          example: "#fef5ee"
        balanceType:
          anyOf:
            - type: number
              enum:
                - 0
            - type: number
              enum:
                - 1
          description: 収支タイプ（0=支出, 1=収入）
          example: 0
        displayOrder:
          type: integer
          description: 表示順
          example: 1
      required:
        - id
        - key
        - name
        - color
        - bg
        - balanceType
        - displayOrder
    CategoriesResponse:
      type: array
      items:
        $ref: "#/components/schemas/CategoryItem"
    ExpenseResponse:
      type: object
      properties:
        id:
          type: string
          description: Expense ID (ULID)
          example: 01ARZ3NDEKTSV4RRFFQ69G5FAV
        amount:
          type: integer
          description: 金額（円）
          example: 1000
        balanceType:
          anyOf:
            - type: number
              enum:
                - 0
            - type: number
              enum:
                - 1
          description: "収支区分: 0=支出, 1=収入"
          example: 0
        userId:
          type: string
          description: ユーザーID
          example: user01
        categoryId:
          type: integer
          description: カテゴリID
          example: 1
        content:
          type: string
          nullable: true
          description: 備考
          example: 昼食代
        date:
          type: string
          description: 日付 (YYYY-MM-DD)
          example: 2024-03-15
        createdDate:
          type: string
          description: 作成日時 (ISO 8601)
          example: 2024-03-15T12:00:00.000Z
        updatedDate:
          type: string
          description: 更新日時 (ISO 8601)
          example: 2024-03-15T12:00:00.000Z
        deletedDate:
          type: string
          nullable: true
          description: 削除日時 (ISO 8601)
          example: null
      required:
        - id
        - amount
        - balanceType
        - userId
        - categoryId
        - content
        - date
        - createdDate
        - updatedDate
        - deletedDate
    DashboardResponse:
      type: object
      properties:
        todayExpense:
          type: integer
          description: 本日の支出合計（円）
          example: 1500
        dailyBudget:
          type: object
          nullable: true
          properties:
            amount:
              type: integer
              description: 1日予算（円）
              example: 3000
            remaining:
              type: integer
              description: 本日の残予算（円）
              example: 1500
            ratio:
              type: number
              description: 残予算比率（0〜1+）
              example: 0.5
            daysUntilPayday:
              type: integer
              description: 給料日まで何日
              example: 12
          required:
            - amount
            - remaining
            - ratio
            - daysUntilPayday
          description: 1日予算（設定未完了の場合 null）
        monthSummary:
          type: object
          properties:
            expense:
              type: integer
              description: 今月の支出合計
              example: 45000
            income:
              type: integer
              description: 今月の収入合計
              example: 200000
          required:
            - expense
            - income
        lastMonthExpense:
          type: integer
          description: 先月の支出合計
          example: 50000
        weeklyRecord:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                description: 日付 (YYYY-MM-DD)
                example: 2026-06-13
              dow:
                type: string
                description: 曜日
                example: 金
              expense:
                type: integer
                description: 支出合計（円）
                example: 1500
              recorded:
                type: boolean
                description: 記録があるか
                example: true
            required:
              - date
              - dow
              - expense
              - recorded
        recentExpenses:
          type: array
          items:
            $ref: "#/components/schemas/ExpenseResponse"
        streak:
          type: integer
          description: 連続記録日数
          example: 5
      required:
        - todayExpense
        - dailyBudget
        - monthSummary
        - lastMonthExpense
        - weeklyRecord
        - recentExpenses
        - streak
    ExpenseListResponse:
      type: object
      properties:
        expense:
          type: array
          items:
            $ref: "#/components/schemas/ExpenseResponse"
      required:
        - expense
    ExpenseDetailResponse:
      type: object
      properties:
        expense:
          $ref: "#/components/schemas/ExpenseResponse"
      required:
        - expense
    CreateExpenseBody:
      type: object
      properties:
        newData:
          type: object
          properties:
            amount:
              type: integer
              minimum: 1
              description: 金額（円）
              example: 1500
            balanceType:
              anyOf:
                - type: number
                  enum:
                    - 0
                - type: number
                  enum:
                    - 1
              description: "収支区分: 0=支出, 1=収入"
              example: 0
            userId:
              type: string
              minLength: 1
              description: ユーザーID
              example: user01
            date:
              type: string
              minLength: 1
              description: 日付 (YYYY-MM-DD)
              example: 2024-03-15
            categoryId:
              type: integer
              minimum: 0
              description: "カテゴリID（省略時はデフォルト: 1=食費）"
              example: 3
            content:
              type: string
              nullable: true
              description: 備考
              example: 昼食代
          required:
            - amount
            - balanceType
            - userId
            - date
          description: 支出データ
      required:
        - newData
    UpdateExpenseBody:
      type: object
      properties:
        updateData:
          type: object
          properties:
            amount:
              type: integer
              minimum: 1
              description: 金額（円）
              example: 1500
            balanceType:
              anyOf:
                - type: number
                  enum:
                    - 0
                - type: number
                  enum:
                    - 1
              description: "収支区分: 0=支出, 1=収入"
              example: 0
            date:
              type: string
              minLength: 1
              description: 日付 (YYYY-MM-DD)
              example: 2024-03-15
            categoryId:
              type: integer
              minimum: 0
              description: カテゴリID
              example: 3
            content:
              type: string
              nullable: true
              description: 備考
              example: 昼食代
          required:
            - amount
            - balanceType
            - date
          description: 更新データ
      required:
        - updateData
    ExpenseParseResponse:
      type: object
      properties:
        amount:
          type: integer
          nullable: true
          description: 抽出された金額（円）。見つからない場合は null
          example: 900
        categoryId:
          type: integer
          description: "推定カテゴリ ID（0: 未分類）"
          example: 1
        content:
          type: string
          description: 入力テキスト（備考欄の初期値として利用）
          example: ランチ代¥900
        date:
          type: string
          description: パース実行日（YYYY-MM-DD）
          example: 2026-05-09
      required:
        - amount
        - categoryId
        - content
        - date
    ExpenseParseRequest:
      type: object
      properties:
        text:
          type: string
          minLength: 1
          description: "パース対象テキスト（例: 「ランチ代¥900」「スーパーで1200円」）"
          example: ランチ代¥900
        imageBase64:
          type: string
          description: レシート画像（Base64）。現時点では未対応（将来的に AI モデルで処理）
      required:
        - text
    BudgetResponse:
      type: object
      properties:
        id:
          type: string
          description: Budget ID (ULID)
          example: 01ARZ3NDEKTSV4RRFFQ69G5FAV
        amount:
          type: integer
          description: 金額（円）
          example: 1000
        balanceType:
          anyOf:
            - type: number
              enum:
                - 0
            - type: number
              enum:
                - 1
          description: "収支区分: 0=支出, 1=収入"
          example: 0
        userId:
          type: string
          description: ユーザーID
          example: user01
        categoryId:
          type: integer
          description: カテゴリID
          example: 1
        content:
          type: string
          nullable: true
          description: 備考
          example: 食費予算
        date:
          type: string
          description: 日付 (YYYY-MM)
          example: 2024-03
        createdDate:
          type: string
          description: 作成日時 (ISO 8601)
        updatedDate:
          type: string
          description: 更新日時 (ISO 8601)
        deletedDate:
          type: string
          nullable: true
          description: 削除日時 (ISO 8601)
          example: null
      required:
        - id
        - amount
        - balanceType
        - userId
        - categoryId
        - content
        - date
        - createdDate
        - updatedDate
        - deletedDate
    BudgetListResponse:
      type: object
      properties:
        budget:
          type: array
          items:
            $ref: "#/components/schemas/BudgetResponse"
      required:
        - budget
    BudgetDetailResponse:
      type: object
      properties:
        budget:
          $ref: "#/components/schemas/BudgetResponse"
      required:
        - budget
    CreateBudgetBody:
      type: object
      properties:
        newData:
          type: object
          additionalProperties:
            nullable: true
          description: 予算データ
      required:
        - newData
    UserResponse:
      type: object
      properties:
        userId:
          type: string
          description: ユーザーID
          example: 01ARZ3NDEKTSV4RRFFQ69G5FAV
        userName:
          type: string
          description: ユーザー名
          example: 山田太郎
        email:
          type: string
          nullable: true
          description: メールアドレス
          example: taro@example.com
        role:
          type: string
          enum: &a1
            - ADMIN
            - USER
            - GUEST
          description: ユーザーロール
          example: USER
        status:
          type: string
          enum: &a2
            - ACTIVE
            - INACTIVE
          description: ユーザーステータス
          example: ACTIVE
        createdAt:
          type: string
          description: 作成日時 (ISO 8601)
          example: 2026-04-13T00:00:00.000Z
        updatedAt:
          type: string
          description: 更新日時 (ISO 8601)
          example: 2026-04-13T00:00:00.000Z
      required:
        - userId
        - userName
        - email
        - role
        - status
        - createdAt
        - updatedAt
    UserListResponse:
      type: object
      properties:
        user:
          type: array
          items:
            $ref: "#/components/schemas/UserResponse"
      required:
        - user
    UserDetailResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"
      required:
        - user
    CreateUserBody:
      type: object
      properties:
        userName:
          type: string
          minLength: 1
          maxLength: 50
          description: ユーザー名
          example: 山田太郎
        password:
          type: string
          minLength: 8
          description: パスワード（平文）
        email:
          type: string
          nullable: true
          format: email
          description: メールアドレス
          example: taro@example.com
        role:
          type: string
          enum: *a1
          description: ユーザーロール
          example: USER
      required:
        - userName
        - password
    UpdateUserBody:
      type: object
      properties:
        userName:
          type: string
          minLength: 1
          maxLength: 50
          description: ユーザー名
          example: 山田太郎
        password:
          type: string
          minLength: 8
          description: 新しいパスワード（平文）。省略時は変更なし
        email:
          type: string
          nullable: true
          format: email
          description: メールアドレス
          example: taro@example.com
        role:
          type: string
          enum: *a1
          description: ユーザーロール
          example: USER
        status:
          type: string
          enum: *a2
          description: ユーザーステータス
          example: ACTIVE
    SuccessResponse:
      type: object
      properties:
        result:
          type: string
          enum:
            - success
          example: success
      required:
        - result
    RegisterBody:
      type: object
      properties:
        userId:
          type: string
          minLength: 3
          maxLength: 30
          pattern: ^[a-zA-Z0-9_-]+$
          description: ログインIDを兼ねるユーザー名
          example: yamada_taro
        displayName:
          type: string
          minLength: 1
          maxLength: 50
          description: 表示名（省略時はuserIdと同値）
          example: 山田太郎
        password:
          type: string
          minLength: 8
          maxLength: 128
          description: パスワード（平文）
        securityQuestionId:
          type: integer
          minimum: 0
          exclusiveMinimum: true
          description: 秘密の質問ID
          example: 1
        securityAnswer:
          type: string
          minLength: 1
          maxLength: 100
          description: 秘密の質問の回答（平文）
          example: ○○市
      required:
        - userId
        - password
        - securityQuestionId
        - securityAnswer
    CheckUserNameResponse:
      type: object
      properties:
        available:
          type: boolean
          description: 使用可能かどうか
          example: true
      required:
        - available
    SecurityQuestion:
      type: object
      properties:
        id:
          type: integer
          description: 質問ID
          example: 1
        text:
          type: string
          description: 質問文
          example: 幼少期に住んでいた町・村の名前は？
      required:
        - id
        - text
    SecurityQuestionListResponse:
      type: object
      properties:
        questions:
          type: array
          items:
            $ref: "#/components/schemas/SecurityQuestion"
      required:
        - questions
    RecoveryQuestionResponse:
      type: object
      properties:
        questionId:
          type: integer
          description: 質問ID
          example: 1
        questionText:
          type: string
          description: 質問文
          example: 幼少期に住んでいた町・村の名前は？
      required:
        - questionId
        - questionText
    PasswordResetTokenResponse:
      type: object
      properties:
        result:
          type: string
          enum:
            - success
        resetToken:
          type: string
          description: パスワードリセット用一時トークン（30分有効）
        expiresAt:
          type: string
          description: 有効期限 (ISO 8601)
      required:
        - result
        - resetToken
        - expiresAt
    VerifyRecoveryBody:
      type: object
      properties:
        userId:
          type: string
          minLength: 1
          description: ユーザーID
          example: yamada_taro
        answer:
          type: string
          minLength: 1
          description: 秘密の質問の回答
      required:
        - userId
        - answer
    ResetPasswordBody:
      type: object
      properties:
        resetToken:
          type: string
          minLength: 1
          description: パスワードリセット用一時トークン
        newPassword:
          type: string
          minLength: 8
          maxLength: 128
          description: 新しいパスワード（平文）
      required:
        - resetToken
        - newPassword
    FixedExpensesDetail:
      type: object
      nullable: true
      properties:
        rent:
          type: integer
          minimum: 0
          description: 家賃（円）
          example: 80000
        utilities:
          type: integer
          minimum: 0
          description: 光熱費（円）
          example: 15000
        insurance:
          type: integer
          minimum: 0
          description: 保険（円）
          example: 10000
        subscriptions:
          type: integer
          minimum: 0
          description: サブスク（円）
          example: 5000
        transportation:
          type: integer
          minimum: 0
          description: 交通費（円）
          example: 10000
        other:
          type: integer
          minimum: 0
          description: その他（円）
          example: 5000
      required:
        - rent
        - utilities
        - insurance
        - subscriptions
        - transportation
        - other
      description: 固定費内訳（null = 未設定）
    UserSettingsResponse:
      type: object
      properties:
        totalAssets:
          type: integer
          minimum: 0
          description: 総資産（円）
          example: 5000000
        monthlyIncome:
          type: integer
          minimum: 0
          description: 月次固定収入（円）
          example: 200000
        paydayDay:
          type: integer
          minimum: 1
          maximum: 31
          description: "給料日（月の何日か: 1〜31）"
          example: 25
        fixedExpenses:
          type: integer
          minimum: 0
          description: 月次固定費合計（円）
          example: 80000
        fixedExpensesDetail:
          $ref: "#/components/schemas/FixedExpensesDetail"
        initialSetupCompleted:
          type: boolean
          description: 初回設定完了フラグ
          example: false
      required:
        - totalAssets
        - monthlyIncome
        - paydayDay
        - fixedExpenses
        - fixedExpensesDetail
        - initialSetupCompleted
    UpsertUserSettingsBody:
      type: object
      properties:
        totalAssets:
          type: integer
          minimum: 0
          description: 総資産（円）
          example: 5000000
        monthlyIncome:
          type: integer
          minimum: 0
          description: 月次固定収入（円）
          example: 200000
        paydayDay:
          type: integer
          minimum: 1
          maximum: 31
          description: "給料日（月の何日か: 1〜31）"
          example: 25
        fixedExpenses:
          type: integer
          minimum: 0
          description: 月次固定費合計（円）— fixedExpensesDetail がある場合は無視
          example: 80000
        fixedExpensesDetail:
          allOf:
            - $ref: "#/components/schemas/FixedExpensesDetail"
            - description: 固定費内訳（省略時は既存値を維持）
        initialSetupCompleted:
          type: boolean
          description: 初回設定完了フラグ
          example: true
      required:
        - totalAssets
        - monthlyIncome
        - paydayDay
        - fixedExpenses
  parameters: {}
paths:
  /api/login:
    post:
      tags:
        - Auth
      summary: ログイン
      description: userId / password で認証し、JWT アクセストークンとリフレッシュトークンを返す。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPairResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 認証失敗（詳細は返さない）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/guest-login:
    post:
      tags:
        - Auth
      summary: ゲストログイン
      description: パスワード不要でゲストユーザーとしてログインし、JWT トークンペアを返す。
      responses:
        "200":
          description: ゲストログイン成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPairResponse"
        "404":
          description: ゲストユーザーが存在しない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/refresh:
    post:
      tags:
        - Auth
      summary: トークンリフレッシュ
      description: リフレッシュトークンを消費し、新しいトークンペアを返す（Refresh Token Rotation）。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: リフレッシュ成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPairResponse"
        "400":
          description: refreshToken が未指定
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: トークン無効または再利用検知
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/logout:
    post:
      tags:
        - Auth
      summary: ログアウト
      description: リフレッシュトークンを失効させる。
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200":
